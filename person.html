            experience: [
                {
                    company: "腾讯科技有限公司",
                    position: "大模型应用开发工程师",

                    desc: [
                        "负责大模型相关应用的设计、开发和落地，参与从需求分析到上线运维的全流程",

                        "优化大模型调用成本，通过缓存、批量处理等方式降低API调用成本30%",
                        "编写技术文档和培训材料，赋能团队其他成员掌握大模型应用开发技能"
                    ]

                    company: "华为人工智能研究院",
                    position: "算法工程师",

                    ]
                }
            ],

                    major: "软件工程",
                    degree: "本科",
                    period: "2013.09 - 2017.06"

        };

        // 页面加载后渲染内容
        document.addEventListener('DOMContentLoaded', function() {
            // 渲染个人信息（新增头像渲染）
            document.getElementById('name').textContent = PERSONAL_INFO.name;
            document.getElementById('job-title').textContent = PERSONAL_INFO.jobTitle;
            document.getElementById('bio').textContent = PERSONAL_INFO.bio;
            document.getElementById('location').textContent = PERSONAL_INFO.location;
            document.getElementById('phone').textContent = PERSONAL_INFO.phone;
            document.getElementById('email').textContent = PERSONAL_INFO.email;
            document.getElementById('wechat').textContent = PERSONAL_INFO.wechat;
            document.getElementById('github').href = PERSONAL_INFO.github;
            document.getElementById('github').textContent = PERSONAL_INFO.github.split('/').pop();
            // 渲染头像
            if (PERSONAL_INFO.avatar) {
                document.getElementById('avatar').src = PERSONAL_INFO.avatar;
            }

            // 渲染技能
            const skillsContainer = document.getElementById('skills-list');
            PERSONAL_INFO.skills.forEach(skill => {
                const skillItem = document.createElement('div');
                skillItem.className = 'bg-slate-100 text-slate-800 px-4 py-2 rounded-full text-sm';
                skillItem.textContent = skill;
                skillsContainer.appendChild(skillItem);
            });

            // 渲染项目经验
            const projectsContainer = document.getElementById('projects-list');
            PERSONAL_INFO.projects.forEach(project => {
                const projectItem = document.createElement('div');
                projectItem.className = 'mb-6 last:mb-0';
                projectItem.innerHTML = `
                    <div class="flex justify-between items-start mb-2">
                        <h4 class="text-lg font-semibold text-blue-800">${project.title}</h4>
                        <span class="text-sm text-slate-500">${project.period}</span>
                    </div>
                    <ul class="list-disc list-inside text-slate-700 space-y-1 pl-2">
                        ${project.desc.map(item => `<li>${item}</li>`).join('')}
                    </ul>
                `;
                projectsContainer.appendChild(projectItem);
            });

            // 渲染工作经历
            const expContainer = document.getElementById('experience-list');
            PERSONAL_INFO.experience.forEach(exp => {
                const expItem = document.createElement('div');
                expItem.className = 'mb-6 last:mb-0';
                expItem.innerHTML = `
                    <div class="flex justify-between items-start mb-2">
                        <h4 class="text-lg font-semibold text-blue-800">${exp.position}</h4>
                        <span class="text-sm text-slate-500">${exp.period}</span>
                    </div>
                    <p class="text-slate-600 mb-2">${exp.company}</p>
                    <ul class="list-disc list-inside text-slate-700 space-y-1 pl-2">
                        ${exp.desc.map(item => `<li>${item}</li>`).join('')}
                    </ul>
                `;
                expContainer.appendChild(expItem);
            });

            // 渲染教育背景
            const eduContainer = document.getElementById('education-list');
            PERSONAL_INFO.education.forEach(edu => {
                const eduItem = document.createElement('div');
                eduItem.className = 'mb-4 last:mb-0';
                eduItem.innerHTML = `
                    <div class="flex justify-between items-start">
                        <div>
                            <h4 class="font-semibold text-blue-800">${edu.school}</h4>
                            <p class="text-slate-600">${edu.major} | ${edu.degree}</p>
                        </div>
                        <span class="text-sm text-slate-500">${edu.period}</span>
                    </div>
                `;
                eduContainer.appendChild(eduItem);
            });
        });
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .content-auto {
                content-visibility: auto;
            }
            .section-title {
                @apply text-xl font-bold text-slate-800 border-b-2 border-blue-500 pb-2 mb-4;
            }
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans">
