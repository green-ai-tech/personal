    <title>AI大模型应用与开发</title>
    <style>
        /* 全局重置与基础样式 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'SF Pro Display', 'Microsoft YaHei', sans-serif;
        }

        /* 科技感背景 */
        body {
            background: #0a0e17;
            background: linear-gradient(135deg, #0a0e17 0%, #141e30 50%, #243b55 100%);
            color: #e0e0e0;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* 动态网格背景（科技感核心） */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                linear-gradient(rgba(66, 153, 225, 0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(66, 153, 225, 0.1) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: -2;
            animation: gridMove 20s linear infinite;
        }

        /* 渐变光效叠加 */
        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 70% 30%, rgba(66, 153, 225, 0.2) 0%, transparent 60%);
            z-index: -1;
            animation: glowPulse 15s ease-in-out infinite alternate;
        }

        /* 动画效果 */
        @keyframes gridMove {
            0% { background-position: 0 0; }
            100% { background-position: 50px 50px; }
        }

        @keyframes glowPulse {
            0% { opacity: 0.6; }
            100% { opacity: 1; transform: scale(1.05); }
        }

        /* 容器 */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* 导航栏（悬浮+毛玻璃） */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            position: sticky;
            top: 0;
            background: rgba(10, 14, 23, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(66, 153, 225, 0.3);
            z-index: 100;
        }

        .logo {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(90deg, #4299e1, #38b2ac);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .nav-links a {
            color: #e0e0e0;
            text-decoration: none;
            margin-left: 30px;
            position: relative;
            transition: color 0.3s ease;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 2px;
            background: #4299e1;
            transition: width 0.3s ease;
        }

        .nav-links a:hover {
            color: #4299e1;
        }

        .nav-links a:hover::after {
            width: 100%;
        }

        /* 英雄区 */
        .hero {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 80px 0;
            gap: 50px;
            min-height: 80vh;
        }

        .hero-text {
            flex: 1;
        }

        .hero-text h1 {
            font-size: 52px;
            line-height: 1.2;
            margin-bottom: 20px;
        }

        .hero-text h1 span {
            background: linear-gradient(90deg, #4299e1, #38b2ac);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .hero-text .subtitle {
            font-size: 24px;
            color: #a0aec0;
            margin-bottom: 30px;
        }

        .hero-text .intro-text {
            font-size: 18px;
            line-height: 1.8;
            color: #cbd5e0;
            margin-bottom: 40px;
        }

        .btn {
            display: inline-block;
            padding: 14px 32px;
            background: linear-gradient(90deg, #4299e1, #38b2ac);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(66, 153, 225, 0.2);
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(66, 153, 225, 0.4);
        }

        .hero-img {
            flex: 1;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 0 80px rgba(66, 153, 225, 0.2);
            border: 1px solid rgba(66, 153, 225, 0.3);
        }

        .hero-img img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* 通用区块样式 */
        section {
            padding: 80px 0;
        }

        .section-title {
            text-align: center;
            font-size: 36px;
            margin-bottom: 60px;
            position: relative;
        }

        .section-title::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 3px;
            background: linear-gradient(90deg, #4299e1, #38b2ac);
        }

        /* 关于我 */
        .about {
            background: rgba(16, 23, 42, 0.5);
            border-radius: 16px;
            border: 1px solid rgba(66, 153, 225, 0.2);
            padding: 60px;
            margin: 40px 0;
        }

        .about-content {
            display: flex;
            align-items: center;
            gap: 50px;
        }

        .about-avatar {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            overflow: hidden;
            border: 3px solid rgba(66, 153, 225, 0.3);
        }

        .about-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .about-text {
            flex: 1;
        }

        .about-text p {
            font-size: 18px;
            line-height: 1.8;
            color: #cbd5e0;
            margin-bottom: 20px;
        }

        .info-list {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-top: 30px;
        }

        .info-item {
            display: flex;
            gap: 10px;
        }

        .info-item label {
            color: #4299e1;
            font-weight: 600;
            min-width: 80px;
        }

        /* 项目展示 */
        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 30px;
        }

        .project-card {
            background: rgba(16, 23, 42, 0.5);
            border-radius: 16px;
            border: 1px solid rgba(66, 153, 225, 0.2);
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .project-card:hover {
            transform: translateY(-8px);
            border-color: #4299e1;
            box-shadow: 0 15px 30px rgba(66, 153, 225, 0.2);
        }

        .project-icon {
            background: linear-gradient(45deg, #4299e1, #38b2ac);
            padding: 30px;
            text-align: center;
            color: white;
            font-size: 40px;
        }

        .project-content {
            padding: 30px;
        }

        .project-content h3 {
            font-size: 22px;
            margin-bottom: 15px;
            color: white;
        }

        .project-content p {
            color: #a0aec0;
            line-height: 1.8;
            margin-bottom: 20px;
        }

        .project-content a {
            color: #4299e1;
            text-decoration: none;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        /* 技能栈 */
        .skills-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }

        .skill-card {
            background: rgba(16, 23, 42, 0.5);
            border-radius: 12px;
            border: 1px solid rgba(66, 153, 225, 0.2);
            padding: 25px;
            transition: all 0.3s ease;
        }

        .skill-card:hover {
            border-color: #4299e1;
            transform: translateY(-5px);
        }

        .skill-icon {
            font-size: 36px;
            color: #4299e1;
            margin-bottom: 15px;
        }

        .skill-card h4 {
            font-size: 18px;
            margin-bottom: 10px;
            color: white;
        }

        .skill-card p {
            color: #a0aec0;
            line-height: 1.6;
        }

        /* 联系我 */
        .contact {
            text-align: center;
        }

        .contact p {
            font-size: 18px;
            color: #a0aec0;
            max-width: 600px;
            margin: 0 auto 40px;
            line-height: 1.8;
        }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
        }

        .social-links a {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 60px;
            height: 60px;
            background: rgba(16, 23, 42, 0.8);
            border: 1px solid rgba(66, 153, 225, 0.2);
            border-radius: 50%;
            color: #4299e1;
            font-size: 24px;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .social-links a:hover {
            background: #4299e1;
            color: white;
            transform: translateY(-5px);
        }

        /* 页脚 */
        footer {
            text-align: center;
            padding: 40px 0;
            border-top: 1px solid rgba(66, 153, 225, 0.2);
            color: #a0aec0;
            margin-top: 80px;
        }

        /* 响应式适配 */
        @media (max-width: 768px) {
            .hero {
                flex-direction: column;
                text-align: center;
                padding: 60px 0;
                min-height: auto;
            }

            .hero-text h1 {
                font-size: 36px;
            }

            .about-content {
                flex-direction: column;
                text-align: center;
            }

            .info-list {
                grid-template-columns: 1fr;
            }

            .projects-grid, .skills-grid {
                grid-template-columns: 1fr;
            }

            .nav-links {
                display: none;
            }
        }
    </style>
    <!-- 引入图标库 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- 导航栏 -->
    <div class="container">
        <nav>
            <div class="logo" id="navLogo">AI大模型应用</div>
            <div class="nav-links">
                <a href="#home">首页</a>
                <a href="#about">关于我</a>
                <a href="#projects">项目经验</a>
                <a href="#skills">技能栈</a>
                <a href="#contact">联系我</a>
            </div>
        </nav>

        <!-- 英雄区 -->
        <section id="home" class="hero">
            <div class="hero-text">
                <h1>你好，我是 <span id="heroName">${PROFILE.title}</span><br></h1>
                <div class="subtitle" id="heroSlogan">${PROFILE.slogan}</div>
                <div class="intro-text" id="heroIntro">
                    5年AI大模型应用开发经验，专注于大模型落地与工程化实现<br>
                    精通LangChain/LlamaIndex框架，擅长RAG知识库搭建、大模型微调、多模态应用开发
                </div>
                <a href="#contact" class="btn">联系我</a>
            </div>
            <div class="hero-img">
                <img id="heroImg" src="images/heroImg.png" alt="AI大模型应用">
            </div>
        </section>

        <!-- 关于我 -->
        <section id="about" class="about">
            <h2 class="section-title">关于我</h2>
            <div class="about-content">
                <div class="about-avatar">
                    <img id="avatarImg" src="images/avatarImg.png" alt="个人头像">
                </div>
                <div class="about-text">
                    <div id="aboutIntro"></div>
                    <div class="info-list">
                        <div class="info-item">
                            <label>姓名：</label>
                            <span id="infoName">李四</span>
                        </div>
                        <div class="info-item">
                            <label>邮箱：</label>
                            <span id="infoEmail">lisi@example.com</span>
                        </div>
                        <div class="info-item">
                            <label>电话：</label>
                            <span id="infoPhone">13900139000</span>
                        </div>
                        <div class="info-item">
                            <label>专业：</label>
                            <span id="infoMajor">AI大模型应用与开发</span>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- 项目经验 -->
        <section id="projects">
            <h2 class="section-title">项目经验</h2>
            <div class="projects-grid" id="projectsContainer"></div>
        </section>

        <!-- 技能栈 -->
        <section id="skills">
            <h2 class="section-title">技能栈</h2>
            <div class="skills-grid" id="skillsContainer"></div>
        </section>

        <!-- 联系我 -->
        <section id="contact" class="contact">
            <h2 class="section-title">联系我</h2>
            <p>如果您有AI大模型应用相关的合作需求或技术交流，欢迎随时联系我</p>
            <a href="mailto:lisi@example.com" class="btn" id="contactBtn">发送邮件</a>
            <div class="social-links" id="socialContainer"></div>
        </section>

        <!-- 页脚 -->
        <footer id="footerText">© 2024 李四 - AI大模型应用工程师 | 版权所有</footer>
    </div>

    <script>
        // ==================== 页面渲染逻辑（无需修改）====================
        document.addEventListener('DOMContentLoaded', function() {
            // 1. 渲染基础信息
            document.getElementById('navLogo').textContent = PROFILE.name + " | " + PROFILE.title;
            document.getElementById('heroName').textContent = PROFILE.name;
            document.getElementById('heroSlogan').textContent = PROFILE.slogan;
            document.getElementById('heroImg').src = PROFILE.heroImage;
            document.getElementById('avatarImg').src = PROFILE.avatar;
            document.getElementById('infoName').textContent = PROFILE.name;
            document.getElementById('infoEmail').textContent = PROFILE.email;
            document.getElementById('infoPhone').textContent = PROFILE.phone;
            document.getElementById('infoMajor').textContent = PROFILE.major;
            document.getElementById('contactBtn').href = "mailto:" + PROFILE.email;
            document.getElementById('footerText').textContent = PROFILE.footer;

            // 2. 渲染个人简介
            const introContainer = document.getElementById('aboutIntro');
            PROFILE.intro.forEach(text => {
                const p = document.createElement('p');
                p.textContent = text;
                introContainer.appendChild(p);
            });

            // 3. 渲染项目经验
            const projectsContainer = document.getElementById('projectsContainer');
            PROFILE.projects.forEach(project => {
                const card = document.createElement('div');
                card.className = 'project-card';
                card.innerHTML = `
                    <div class="project-icon">
                        <i class="${project.icon}"></i>
                    </div>
                    <div class="project-content">
                        <h3>${project.title}</h3>
                        <p>${project.desc}</p>
                        <a href="${project.link}" target="_blank">
                            查看详情 <i class="fas fa-arrow-right"></i>
                        </a>
                    </div>
                `;
                projectsContainer.appendChild(card);
            });

            // 4. 渲染技能栈
            const skillsContainer = document.getElementById('skillsContainer');
            PROFILE.skills.forEach(skill => {
                const card = document.createElement('div');
                card.className = 'skill-card';
                card.innerHTML = `
                    <div class="skill-icon">
                        <i class="${skill.icon}"></i>
                    </div>
                    <h4>${skill.name}</h4>
                    <p>${skill.value}</p>
                `;
                skillsContainer.appendChild(card);
            });

            // 5. 渲染社交链接
            const socialContainer = document.getElementById('socialContainer');
            PROFILE.social.forEach(item => {
                const a = document.createElement('a');
                a.href = item.link;
                a.target = "_blank";
                a.innerHTML = `<i class="${item.icon}"></i>`;
                socialContainer.appendChild(a);
            });

            // 6. 平滑滚动
            document.querySelectorAll('a[href^="#"]').forEach(anchor => {
                anchor.addEventListener('click', function (e) {
                    e.preventDefault();
                    document.querySelector(this.getAttribute('href')).scrollIntoView({
                        behavior: 'smooth'
                    });
                });
            });
        });
    </script>
</body>
</html>
